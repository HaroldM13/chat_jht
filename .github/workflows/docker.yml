name: Build y Push a DockerHub

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código (con submódulos)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend_chat
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      - name: Build y push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend_chat
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest
          build-args: |
            VITE_API_URL=http://localhost:8000
            VITE_WS_URL=ws://localhost:8000
