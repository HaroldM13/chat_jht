networks:
  chat_net:
    driver: bridge

volumes:
  mongo_data:

services:

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    networks:
      - chat_net
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - chat_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq
    networks:
      chat_net:
        aliases:
          - rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend_chat
    restart: unless-stopped
    networks:
      - chat_net
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
    volumes:
      - ./backend_chat/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend_chat
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    restart: unless-stopped
    networks:
      - chat_net
    ports:
      - "5173:80"
    depends_on:
      - backend

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    networks:
      - chat_net
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    networks:
      - chat_net
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
